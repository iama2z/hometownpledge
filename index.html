<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBou8Z3xdd2Xb7FJ9mxxTTnpQ9XzzRGx_I",
    authDomain: "hometownpledge.firebaseapp.com",
    projectId: "hometownpledge",
    storageBucket: "hometownpledge.firebasestorage.app",
    messagingSenderId: "217063602156",
    appId: "1:217063602156:web:8d06ab67e372a794e6b2c9",
    measurementId: "G-NH78MP1RX8"
  };

  // Initialize Firebase and Firestore
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Logic to update ticker and handle signatures
  const tickerElement = document.getElementById('ticker');
  const signatureForm = document.getElementById('signatureForm');

  // Real-time ticker update
  onSnapshot(collection(db, "signatures"), (snapshot) => {
    tickerElement.innerText = snapshot.size;
  });

  // Form submission logic
  signatureForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const zip = document.getElementById('zip').value;

    try {
      await addDoc(collection(db, "signatures"), {
        name: name,
        zip: zip,
        timestamp: new Date()
      });
      alert("The Wichita Promise has been signed!");
      signatureForm.reset();
    } catch (error) {
      console.error("Error adding signature: ", error);
    }
  });
</script>
